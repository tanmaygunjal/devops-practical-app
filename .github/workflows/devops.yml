name: DevOps Practical Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run test
      run: echo "Test Passed"

    - name: Build Docker image
      run: docker build -t devops-app .

    - name: Show images
      run: docker images